kind = "web"
previewPath = "/"
title = "ARIA — Voice AI Agent"
version = "1.0.0"
id = "artifacts/aria"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20839

[services.development]
run = "pnpm --filter @workspace/aria run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/aria", "run", "build" ]
publicDir = "artifacts/aria/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20839"
BASE_PATH = "/"
